<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>img2css output (3×2)</title>
<style>
/* Generated by img2css — 3×2 px, 5 pixels, boxshadow method, rgba color */
html,body{margin:0;background:#ffffff;}
.img2css-stage{padding:24px;display:inline-block;}
.img2css {
  width: 1px;
  height: 1px;
  background: transparent;
  box-shadow:
    0px 0px 0 0 rgba(255,0,0,1),
    2px 0px 0 0 rgba(255,255,255,1),
    0px 1px 0 0 rgba(26,26,26,1),
    1px 1px 0 0 rgba(0,0,255,0.502),
    2px 1px 0 0 rgba(0,255,0,1);
}
</style>
</head>
<body>
<div class="img2css-stage">
  <div class="img2css"></div>
</div>
</body>
</html>
